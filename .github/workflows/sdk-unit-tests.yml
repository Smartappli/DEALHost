name: SDK Unit Tests

on:
  push:
    branches: ["main", "work"]
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/sdk-unit-tests.yml"
      - "sdk/python/**"
      - "sdk/go/dealhost-sdk/**"
      - "sdk/rust/dealhost-sdk/**"
  pull_request:
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/sdk-unit-tests.yml"
      - "sdk/python/**"
      - "sdk/go/dealhost-sdk/**"
      - "sdk/rust/dealhost-sdk/**"

permissions:
  contents: read

jobs:
  python-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1

      - name: Install SDK
        run: uv pip install --system -e sdk/python

      - name: Run unit tests
        run: python -m unittest discover -s sdk/python/tests -v

  go-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Run unit tests
        working-directory: sdk/go/dealhost-sdk
        run: go test ./...

  rust-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable

      - name: Run unit tests
        working-directory: sdk/rust/dealhost-sdk
        run: cargo test
