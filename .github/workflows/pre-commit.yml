name: Pre-commit

on:
  push:
    branches: ["main", "work"]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pre-commit (ruff all rules)
        uses: pre-commit/action@v3.0.1
