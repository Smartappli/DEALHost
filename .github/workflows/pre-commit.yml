name: Pre-commit

on:
  push:
    branches: ["main", "work"]
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1

      - name: Install pre-commit with uv
        run: uv pip install --system pre-commit

      - name: Run pre-commit on all files
        run: uv run pre-commit run --all-files --show-diff-on-failure
