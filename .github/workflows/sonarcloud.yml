name: SonarCloud

on:
  push:
    branches: ["main", "work"]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@d7fe1a5a186096cccdd5fa2252d223b54fa53a72

      - name: Install requirements with uv
        run: uv pip install --system -r requirements.txt

      - name: Install project package with uv
        run: uv pip install --system -e .

      - name: Install coverage tooling
        run: uv pip install --system coverage

      - name: Run tests and generate coverage report
        env:
          DJANGO_SETTINGS_MODULE: dealhost.settings.test
          GITHUB_TOKEN: test-token
          GITHUB_WEBHOOK_SECRET: test-secret
          APISIX_ADMIN_KEY: test-key
        run: >-
          uv run coverage run --source=apps,dealhost,sdk
          manage.py test tests --verbosity 2

      - name: Export coverage XML
        run: uv run coverage xml -o coverage.xml

      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@6904bd01e29ada115135b5eca20125758ccae53b
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: 'coverage.xml'
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
