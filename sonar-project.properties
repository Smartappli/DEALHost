# SonarCloud configuration
# Update these values if your SonarCloud org/project identifiers differ.
sonar.organization=smartappli-github
sonar.projectKey=Smartappli_DEALHost
sonar.projectName=DEALHost
sonar.python.version=3.12

sonar.sources=apps,dealhost
sonar.tests=tests

# Python coverage report generated in CI/SonarCloud workflows.
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=tests/**,**/migrations/**,manage.py

# Do not count intentionally repetitive test fixtures and generated migrations
# in copy/paste detection for quality-gate duplication.
sonar.cpd.exclusions=tests/**,**/migrations/**
