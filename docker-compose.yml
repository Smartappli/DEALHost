services:
  django-app:
    image: python:3.14-slim
    init: true
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -c "pip install -e . &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      granian --host 0.0.0.0 --port 8000 --interface asgi dealhost.asgi:application"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-dealhost.settings.dev}
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379/1}
    depends_on:
      valkey:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/gateway/health/', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - valkey_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  apisix:
    image: apache/apisix:3.12.0-debian
    restart: unless-stopped
    volumes:
      - ./infra/apisix/routes.json:/usr/local/apisix/conf/apisix.yaml:ro
    environment:
      APISIX_STAND_ALONE: "true"
    depends_on:
      django-app:
        condition: service_healthy
    ports:
      - "9080:9080"
      - "9180:9180"

volumes:
  valkey_data:
